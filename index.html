<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운행일지">
<title>🚛 레미콘 운행일지</title>
<link rel="stylesheet" href="css/style.css?v=10">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div class="app">
  <div id="ptr-indicator" class="ptr-indicator">
    <span class="ptr-icon">🔄</span>
    <span class="ptr-text">당겨서 새로고침</span>
  </div>
  <div class="hdr">
    <div>
      <div class="hdr-t"><svg class="hdr-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8h11v8H1z"/><path d="M12 10h4l3 3v3h-7"/><circle cx="5.5" cy="18" r="1.8"/><circle cx="15.5" cy="18" r="1.8"/><path d="M3.5 5.5 6 8M8 4.5 9.5 8"/></svg>레미콘 운행일지</div>
      <div class="hdr-s" id="hS"></div>
    </div>
  </div>
  <div class="content" id="mc"></div>
  <nav class="nav">
    <button class="nb on" id="nbCalendar" onclick="go('calendar')"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg></span>달력</button>
    <button class="nb" id="nbStats" onclick="go('stats')"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M21 20H3"/></svg></span>통계</button>
    <button class="nb" id="nbAnnual" onclick="go('annual')"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4h8v5a4 4 0 0 1-8 0z"/><path d="M8 5H5v2a3 3 0 0 0 3 3M16 5h3v2a3 3 0 0 1-3 3M12 13v4M8 20h8M10 17h4"/></svg></span>연말결산</button>
    <button class="nb" id="nbConfig" onclick="go('config')"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h10M18 8h2M4 16h2M10 16h10"/><circle cx="16" cy="8" r="2.2"/><circle cx="8" cy="16" r="2.2"/></svg></span>설정</button>
  </nav>
</div>
<script src="js/app.js?v=12"></script>
<script>
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
