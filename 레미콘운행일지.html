body{font-family:-apple-system,sans-serif;overscroll-behavior:none;user-select:none;-webkit-user-select:none;background:var(--th-bg2,#f1f5f9)}

<body>
<div class="app">
<div class="hdr"><div><div class="hdr-t">🚛 레미콘 운행일지</div><div class="hdr-s" id="hS"></div></div></div>
<div class="content" id="mc"></div>
<nav class="nav">
  <button class="nb on" id="nbCalendar" onclick="go('calendar')"><span class="ni">📅</span>달력</button>
  <button class="nb" id="nbEntry" onclick="go('entry')"><span class="ni">✏️</span>기록</button>
  <button class="nb" id="nbStats" onclick="go('stats')"><span class="ni">📊</span>통계</button>
  <button class="nb" id="nbAnnual" onclick="go('annual')"><span class="ni">🏆</span>연말결산</button>
  <button class="nb" id="nbConfig" onclick="go('config')"><span class="ni">⚙️</span>설정</button>
</nav>
</div>

<script>
var tab='calendar',cd=new Date(),sel=null,cSt='work',ol=[],wwList=[],repList=[],prevFB={totalAdded:0,totalUsed:0,balance:0},prevKmVal=0;
var annualYear=new Date().getFullYear();
var logs=JSON.parse(localStorage.getItem('rl9_logs')||localStorage.getItem('rl8_logs')||'{}');
var cfg=JSON.parse(localStorage.getItem('rl9_cfg')||localStorage.getItem('rl8_cfg')||'{"unitPrice":74300,"fuelRate":0.55,"otRate":18000,"fuelPrice":1500,"toll1":3600,"toll2":2400,"initKm":125000,"ot2Pay":0,"theme":"default"}');
if(!cfg.ot2Pay)cfg.ot2Pay=0;

function applyTheme(t){
  document.documentElement.className='';
  if(t&&t!=='default')document.documentElement.classList.add('theme-'+t);
}

function sv(){localStorage.setItem('rl9_logs',JSON.stringify(logs));localStorage.setItem('rl9_cfg',JSON.stringify(cfg));}
function dk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function cc(n){var C=[null,{b:'#E6F1FB',t:'#0C447C'},{b:'#EAF3DE',t:'#27500A'},{b:'#E1F5EE',t:'#085041'},{b:'#FAEEDA',t:'#633806'},{b:'#FAC775',t:'#412402'},{b:'#FBEAF0',t:'#72243E'},{b:'#FAECE7',t:'#711B13'},{b:'#F09595',t:'#501313'}];n=parseInt(n)||0;if(!n)return null;return n<C.length?C[n]:{b:'#E24B4A',t:'#fff'};}

applyTheme(cfg.theme);

function go(t){
  tab=t;
  ['Calendar','Entry','Stats','Annual','Config'].forEach(function(x){document.getElementById('nb'+x).classList.remove('on');});
  document.getElementById('nb'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('on');
  render();
}
function pm(){cd=new Date(cd.getFullYear(),cd.getMonth()-1,1);render();}
function nm(){cd=new Date(cd.getFullYear(),cd.getMonth()+1,1);render();}
function render(){
  if(tab==='calendar')rCal();
  else if(tab==='entry')rEntry();
  else if(tab==='stats')rStats();
  else if(tab==='annual')rAnnual();
  else rConfig();
}

function calcPrevFuel(targetDate){
  var keys=Object.keys(logs).filter(function(k){return k<targetDate;}).sort();
  var ta=0,tu=0;
  keys.forEach(function(k){var v=logs[k];ta+=parseFloat(v.fuel||0);var km=parseInt(v.ekm||0)-parseInt(v.skm||0);tu+=km*cfg.fuelRate;});
  return{totalAdded:+ta.toFixed(2),totalUsed:+tu.toFixed(2),balance:+(ta-tu).toFixed(2)};
}
function calcPrevKm(targetDate){
  var keys=Object.keys(logs).filter(function(k){return k<targetDate;}).sort();
  var t=0;keys.forEach(function(k){var v=logs[k];t+=parseInt(v.ekm||0)-parseInt(v.skm||0);});return t;
}
function fuelMonth(y,m){
  var mp=y+'-'+String(m+1).padStart(2,'0');
  var keys=Object.keys(logs).filter(function(k){return k.startsWith(mp);});
  var mf=0,mu=0;
  keys.forEach(function(k){var v=logs[k],km=parseInt(v.ekm||0)-parseInt(v.skm||0);mf+=parseFloat(v.fuel||0);mu+=km*cfg.fuelRate;});
  return{mf:+mf.toFixed(2),mu:+mu.toFixed(2)};
}
function tollTotal(t1,t2){return(parseInt(t1)||0)*cfg.toll1+(parseInt(t2)||0)*cfg.toll2;}
function monthFuelUpTo(targetDate){
  var mp=targetDate.substring(0,7);
  var keys=Object.keys(logs).filter(function(k){return k.startsWith(mp)&&k<=targetDate;});
  var total=0;keys.forEach(function(k){total+=parseFloat(logs[k].fuel||0);});return+total.toFixed(1);
}

/* ── 달력 ─────────────────────────────── */
var swipeStartX=0,swipeStartY=0;
function rCal(){
  var y=cd.getFullYear(),m=cd.getMonth();
  document.getElementById('hS').textContent=y+'년 '+(m+1)+'월';
  var days=new Date(y,m+1,0).getDate(),first=new Date(y,m,1).getDay();
  var td=new Date(),tdk=dk(td.getFullYear(),td.getMonth(),td.getDate());
  var mp=y+'-'+String(m+1).padStart(2,'0');
  var ml=Object.entries(logs).filter(function(e){return e[0].startsWith(mp);});
  var wd=ml.filter(function(e){return e[1].st==='work'||!e[1].st;}).length;
  var tc=ml.reduce(function(s,e){return s+(parseInt(e[1].calls)||0);},0);
  var ep=tc*cfg.unitPrice;
  var epStr=ep>0?ep.toLocaleString()+'원':'0원';
  var h='<div class="mnav"><button class="ma" onclick="pm()">‹</button><span class="ml">'+y+'년 '+(m+1)+'월</span><button class="ma" onclick="nm()">›</button></div>';
  h+='<div class="cgrid" id="calGrid">';
  ['일','월','화','수','목','금','토'].forEach(function(d){h+='<div class="ch">'+d+'</div>';});
  for(var i=0;i<first;i++)h+='<div class="cc empty"></div>';
  for(var d=1;d<=days;d++){
    var key=dk(y,m,d),log=logs[key]||{};
    var isT=key===tdk,calls=parseInt(log.calls)||0,col=cc(calls);
    var ww=(JSON.parse(log.wwList||'[]')).length,ot2=(JSON.parse(log.ot2List||'[]')).length>0;
    var st=log.st||'';
    var badge='';
    if(st==='vacation')badge='<div class="cbadge-off off-v">휴가</div>';
    else if(st==='repair')badge='<div class="cbadge-off off-r">정비</div>';
    else if(col)badge='<div class="cbadge" style="background:'+col.b+';color:'+col.t+'">'+calls+'</div>';
    var mn='';
    if(ww>0)mn+='<div class="mbadge wbadge">'+(ww>1?ww:'')+'W</div>';
    if(ot2)mn+='<div class="mbadge ot2badge">2시↑</div>';
    h+='<div class="cc'+(isT?' today':'')+'" onclick="cellTap(\''+key+'\')" oncontextmenu="cellLong(event,\''+key+'\')"><span class="dn">'+d+'</span>'+badge+(mn?'<div class="mini-row">'+mn+'</div>':'')
      +'<div class="dots">'+(parseFloat(log.fuel)>0?'<div class="dot df"></div>':'')+(parseFloat(log.ot)>0?'<div class="dot dp"></div>':'')+(tollTotal(log.t1,log.t2)>0?'<div class="dot dt"></div>':'')+(log.photo?'<div class="dot dph"></div>':'')+'</div></div>';
  }
  h+='</div>';
  h+='<div class="sbar"><div class="si"><div class="sl">이달 바리수</div><div class="sv">'+tc+'<span class="su">바리</span></div></div><div class="si"><div class="sl">근무일</div><div class="sv">'+wd+'<span class="su">일</span></div></div><div class="si"><div class="sl">예상급여</div><div class="sv" id="epVal" style="font-size:'+(ep>=1000000?'11px':ep>=100000?'12px':'14px')+'">'+epStr+'</div></div></div>';
  h+='<div class="legend"><div class="li"><div class="lsw" style="background:#EAF3DE"></div>1~3바리</div><div class="li"><div class="lsw" style="background:#FAEEDA"></div>4~5바리</div><div class="li"><div class="lsw" style="background:#FBEAF0"></div>6바리</div><div class="li"><div class="lsw" style="background:#FAECE7"></div>7바리</div><div class="li"><div class="lsw" style="background:#F09595"></div>8↑</div><div class="li"><div class="mbadge wbadge">W</div>폐수</div><div class="li"><div class="mbadge ot2badge">2시↑</div>초과</div><div class="li"><div class="dot df"></div>주유</div><div class="li"><div class="dot dt"></div>톨비</div><div class="li"><div class="dot dph"></div>사진</div></div>';
  h+='<div id="calListPanel" style="display:none;background:var(--th-bg,#fff);border-top:0.5px solid var(--th-border,#e2e8f0);border-bottom:0.5px solid var(--th-border,#e2e8f0)"></div>';
  h+='<div style="padding:8px 16px 4px;font-size:11px;color:var(--th-muted);text-align:center">날짜 탭 → 간단보기 · 길게 탭 → 기록 수정</div>';
  document.getElementById('mc').innerHTML=h;
}

/* 스와이프 — rCal 밖에서 한 번만 등록 */
var swipeLock=false;
document.getElementById('mc').parentNode.addEventListener('touchstart',function(e){
  if(tab!=='calendar')return;
  swipeStartX=e.touches[0].clientX;swipeStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('mc').parentNode.addEventListener('touchend',function(e){
  if(tab!=='calendar'||swipeLock)return;
  var dx=e.changedTouches[0].clientX-swipeStartX;
  var dy=e.changedTouches[0].clientY-swipeStartY;
  if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*2){
    swipeLock=true;
    if(dx<0)nm();else pm();
    setTimeout(function(){swipeLock=false;},400);
  }
},{passive:true});

function openDay(k){sel=k;go('entry');}
function cellTap(k){
  /* 기록 있으면 미리보기, 없으면 바로 기록 */
  var log=logs[k]||{};
  if(log.calls||log.st||log.fuel||log.ot||log.photo){
    toggleCalList(k);
  } else {
    openDay(k);
  }
}
function cellLong(ev,k){ev.preventDefault();openDay(k);}

/* ── 연료 카드 ─────────────────────────── */
function uFuelCard(){
  var el=document.getElementById('fuelCard');if(!el)return;
  var todayFuel=parseFloat(document.getElementById('fF').value)||0;
  var s=parseInt(document.getElementById('fSk').value)||0,e2=parseInt(document.getElementById('fEk').value)||0;
  var km=e2>s?e2-s:0;
  var totalFuel=+(prevFB.totalAdded+todayFuel).toFixed(1);
  var totalUsed=+(prevFB.totalUsed+(km*cfg.fuelRate)).toFixed(1);
  var remain=+(totalFuel-totalUsed).toFixed(1);
  var isPlus=remain>=0;
  el.innerHTML='<div class="fuel-card-title">연료 현황</div>'
    +'<div class="fcrow"><span class="fck">당일 주유량</span><span class="fcv plus">'+(todayFuel>0?'+'+todayFuel:'0')+'L</span></div>'
    +'<div class="fcrow" style="background:#eff6ff"><span class="fck" style="font-weight:600;color:#1d4ed8">총 주유량 <span style="font-size:10px;font-weight:400">(누적)</span></span><span class="fcv blue">'+totalFuel+'L</span></div>'
    +'<div class="fcrow"><span class="fck">누적 소비량 (총km×'+cfg.fuelRate+')</span><span class="fcv minus">−'+totalUsed+'L</span></div>'
    +'<div class="fuel-balance-big"><span class="fbb-label">남은 연료 잔량</span><span class="fbb-val '+(isPlus?'plus':'minus')+'">'+remain+'L</span></div>';
}

  +'<div class="km-card" id="kmCard"><div class="km-card-title">전체 누적 km</div><div class="fcrow"><span class="fck">기준 km</span><span class="fcv neutral">'+cfg.initKm.toLocaleString()+'km</span></div><div class="fcrow"><span class="fck">이전 누적</span><span class="fcv neutral">+'+prevKmVal.toLocaleString()+'km</span></div><div class="fcrow"><span class="fck">오늘 운행</span><span class="fcv plus">+'+kmD+'km</span></div><div class="km-total-bar"><span class="km-total-label">전체 누적 km</span><span class="km-total-val">'+totalKm.toLocaleString()+'km</span></div></div>'

var pendingPhoto='';
function hPh(ev){
  var file=ev.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas'),w=img.width,h=img.height;
      if(w>1200){h=Math.round(h*1200/w);w=1200;}if(h>1600){w=Math.round(w*1600/h);h=1600;}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhoto=canvas.toDataURL('image/jpeg',.75);
      var pv=document.getElementById('photoPreview');
      if(pv)pv.innerHTML='<img style="width:100%;border-radius:8px;max-height:200px;object-fit:cover;margin-top:8px" src="'+pendingPhoto+'"><button class="bdel" style="margin-top:6px" onclick="clrPhoto()">사진 취소</button>';
      /* ★ 갤러리에도 저장 */
      try{
        var a=document.createElement('a');
        a.href=pendingPhoto;
        a.download='운행일지_'+sel+'.jpg';
        document.body.appendChild(a);a.click();document.body.removeChild(a);
      }catch(err){}
    };img.src=e.target.result;
  };r.readAsDataURL(file);
}
function clrPhoto(){pendingPhoto='CLEAR';var pv=document.getElementById('photoPreview');if(pv)pv.innerHTML='';if((logs[sel]||{}).photo)rEntry();}

var calListOpen=false;

function toggleCalList(key){
  if(calListDate===key&&calListOpen){
    calListOpen=false;calListDate=null;
    document.getElementById('calListPanel').style.display='none';
    return;
  }
  calListDate=key;calListOpen=true;
  showCalList(key);
}
function showCalList(key){
  var panel=document.getElementById('calListPanel');
  if(!panel)return;
  var log=logs[key]||{};
  if(!log.calls&&!log.st&&!log.fuel&&!log.ot){panel.style.display='none';calListOpen=false;return;}
  var pts=key.split('-'),mm=pts[1],dd=pts[2];
  var dow=['일','월','화','수','목','금','토'][new Date(+pts[0],+pts[1]-1,+pts[2]).getDay()];
  var km=(log.skm&&log.ekm)?parseInt(log.ekm)-parseInt(log.skm):0;
  var otAmt=(parseFloat(log.ot)||0)*cfg.otRate;
  var toll=tollTotal(log.t1,log.t2);
  var wwL=JSON.parse(log.wwList||'[]');
  var stMap={work:'근무',vacation:'휴가',repair:'정비',other:'기타'};
  var items=[];
  if(log.calls)items.push('🚛 '+log.calls+'바리'+(log.vol?' ('+log.vol+'㎥)':''));
  if(km>0)items.push('📍 운행 '+km+'km');
  if(log.fuel)items.push('⛽ 주유 '+log.fuel+'L');
  if(log.ot)items.push('⏰ 오티 '+log.ot+'h ('+otAmt.toLocaleString()+'원)');
  if(wwL.length)items.push('💧 폐수처리 '+wwL.length+'건');
  if(toll>0)items.push('🛣️ 톨비 '+toll.toLocaleString()+'원');

  var base=(parseInt(log.calls)||0)*cfg.unitPrice;
  panel.innerHTML='<div style="padding:12px 16px;border-bottom:0.5px solid var(--th-border,#e2e8f0);display:flex;align-items:center;justify-content:space-between">'
    +'<span style="font-size:13px;font-weight:600;color:var(--th-text)">'+mm+'월 '+dd+'일 ('+dow+') — '+(stMap[log.st||'work']||'근무')+'</span>'
    +'<button onclick="toggleCalList(\''+key+'\')" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--th-muted)">✕</button>'
    +'</div>'

    +'</div>'
    +'<div style="padding:8px 16px"><button class="bsave" onclick="openDay(\''+key+'\')" style="padding:10px">✏️ 수정하기</button></div>';

    if(!ml2.length){rows+='<tr><td style="padding:8px 10px;font-size:12px;color:#94a3b8">'+(mi+1)+'월</td><td colspan="5" style="padding:8px 6px;font-size:11px;color:#cbd5e1;text-align:center">기록 없음</td></tr>';continue;}
    var wd2=ml2.filter(function(e){return e[1].st==='work'||!e[1].st;}).length;

  }

  var h='<div class="sp">'
  +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><button class="ma" onclick="pyear()">‹</button><span style="font-size:18px;font-weight:700;color:var(--th-text,#1e293b)">'+y+'년 연말결산</span><button class="ma" onclick="nyear()">›</button></div>'
  +'<div class="mgrid" style="margin-bottom:12px">'
  +'<div class="mc dk full"><div class="mk">연간 총 수령액 (유류 별도)</div><div class="mv" style="color:#fff;font-size:'+(annTotal>=100000000?'14px':annTotal>=10000000?'16px':'18px')+'">'+annTotal.toLocaleString()+'<span class="mu" style="color:#94a3b8;font-size:11px">원</span></div></div>'
  +'<div class="mc"><div class="mk">총 근무일</div><div class="mv">'+annWd+'<span class="mu">일</span></div></div>'
  +'<div class="mc"><div class="mk">총 바리수</div><div class="mv">'+annCalls+'<span class="mu">바리</span></div></div>'
  +'<div class="mc"><div class="mk">일 평균 바리</div><div class="mv">'+avgCalls+'<span class="mu">바리</span></div></div>'
  +'<div class="mc"><div class="mk">총 운행거리</div><div class="mv">'+annKm.toLocaleString()+'<span class="mu">km</span></div></div>'
  +'<div class="mc"><div class="mk">연간 오티</div><div class="mv" style="color:#7c3aed;font-size:14px">'+annOTpay.toLocaleString()+'<span class="mu">원</span></div></div>'
  +'<div class="mc"><div class="mk">연간 톨비</div><div class="mv" style="color:var(--th-accent);font-size:14px">'+annToll.toLocaleString()+'<span class="mu">원</span></div></div>'
  +'<div class="mc"><div class="mk">연간 정비비</div><div class="mv" style="color:#dc2626;font-size:14px">'+annRep.toLocaleString()+'<span class="mu">원</span></div></div>'

  +'<div style="font-size:11px;font-weight:600;color:var(--th-muted,#64748b);letter-spacing:.4px;margin-bottom:8px;text-transform:uppercase">월별 상세</div>'
  +'<div style="background:var(--th-bg2,#f8fafc);border-radius:10px;overflow:hidden;border:0.5px solid var(--th-border,#e2e8f0);margin-bottom:12px"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:var(--th-primary,#1a1a2e)"><th style="padding:8px 10px;font-size:11px;color:rgba(255,255,255,.6);font-weight:600;text-align:left">월</th><th style="padding:8px 4px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600;text-align:right">근무</th><th style="padding:8px 4px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600;text-align:right">바리</th><th style="padding:8px 4px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600;text-align:right">기본급</th><th style="padding:8px 4px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600;text-align:right">오티</th><th style="padding:8px 10px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600;text-align:right">합계</th></tr></thead><tbody>'+rows+'</tbody>'
  +'<tfoot><tr style="background:var(--th-primary-dark,#0f172a)"><td style="padding:10px;font-size:12px;font-weight:700;color:#fff">합계</td><td style="padding:10px 4px;font-size:11px;color:rgba(255,255,255,.6);text-align:right">'+annWd+'일</td><td style="padding:10px 4px;font-size:11px;color:rgba(255,255,255,.6);text-align:right">'+annCalls+'</td><td style="padding:10px 4px;font-size:10px;color:#e2e8f0;text-align:right">'+annBase.toLocaleString()+'</td><td style="padding:10px 4px;font-size:10px;color:#a78bfa;text-align:right">'+annOTpay.toLocaleString()+'</td><td style="padding:10px;font-size:12px;font-weight:700;color:#60a5fa;text-align:right">'+annTotal.toLocaleString()+'</td></tr></tfoot>'
  +'</table></div>'
  +'<div style="background:linear-gradient(135deg,#065f46,#047857);border-radius:12px;padding:18px 16px;text-align:center;margin-bottom:16px">'
  +'<div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:6px">'+y+'년 연간 총 수령액 (유류 별도)</div>'
  +'<div style="font-size:'+(annTotal>=100000000?'22px':'26px')+'px;font-weight:700;color:#fff">'+annTotal.toLocaleString()+'원</div>'
  +'<div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:6px">월 평균 '+(annTotal/12).toLocaleString()+'원 · 총 '+annWd+'일 근무</div>'
  +'</div>'
  +'</div>';
  document.getElementById('mc').innerHTML=h;
}

/* ── 설정 탭 ─────────────────────────── */

      +'<span class="theme-name">'+t.name+'</span>'
      +'</div>';

  var h='<div class="cfg-page">'
  +'<div class="cfg-sec">🎨 테마 색상</div>'

  +'<p style="font-size:12px;color:var(--th-muted);margin-bottom:12px">테마를 선택하면 앱 전체 색이 바뀌어요</p>'
  +'<div class="theme-grid">'+themeHtml+'</div>'
  +'</div>'
  +'<div class="cfg-sec">급여 설정</div>'
  +'<div class="sblk">'
  +'<div class="srow"><div><span class="slbl">바리당 단가</span><span class="slbl-sub">바리수 × 단가 = 기본급</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" id="cfg_unit" value="'+cfg.unitPrice+'" oninput="cfg.unitPrice=+this.value;sv()"><span style="font-size:11px;color:#64748b">원</span></div></div>'
  +'<div class="srow"><div><span class="slbl">오티 시간당</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" id="cfg_ot" value="'+cfg.otRate+'" oninput="cfg.otRate=+this.value;sv()"><span style="font-size:11px;color:#64748b">원</span></div></div>'
  +'<div class="srow"><div><span class="slbl">2시간초과 건당</span><span class="slbl-sub">월말결산 건에만 적용</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" id="cfg_ot2" value="'+cfg.ot2Pay+'" placeholder="0" oninput="cfg.ot2Pay=+this.value;sv()"><span style="font-size:11px;color:#64748b">원</span></div></div>'
  +'</div>'
  +'<div class="cfg-sec">유류 설정</div>'
  +'<div class="sblk">'
  +'<div class="srow"><div><span class="slbl">km당 유류 소모</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" step="0.01" id="cfg_fr" value="'+cfg.fuelRate+'" oninput="cfg.fuelRate=+this.value;sv()"><span style="font-size:11px;color:#64748b">L/km</span></div></div>'
  +'<div class="srow"><div><span class="slbl">연료 정산 단가</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" id="cfg_fp" value="'+cfg.fuelPrice+'" oninput="cfg.fuelPrice=+this.value;sv()"><span style="font-size:11px;color:#64748b">원/L</span></div></div>'
  +'</div>'
  +'<div class="cfg-sec">차량 설정</div>'
  +'<div class="sblk">'
  +'<div class="srow"><div><span class="slbl">기준 km (초기값)</span><span class="slbl-sub">앱 시작 시점의 차량 km</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" id="cfg_km" value="'+cfg.initKm+'" oninput="cfg.initKm=+this.value;sv()"><span style="font-size:11px;color:#64748b">km</span></div></div>'
  +'</div>'
  +'<div class="cfg-sec">톨비 설정</div>'
  +'<div class="sblk">'
  +'<div class="srow"><div><span class="slbl">대형 단가</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" id="cfg_t1" value="'+cfg.toll1+'" oninput="cfg.toll1=+this.value;sv()"><span style="font-size:11px;color:#64748b">원</span></div></div>'
  +'<div class="srow"><div><span class="slbl">소형 단가</span></div><div style="display:flex;align-items:center;gap:4px"><input class="sinp" type="number" id="cfg_t2" value="'+cfg.toll2+'" oninput="cfg.toll2=+this.value;sv()"><span style="font-size:11px;color:#64748b">원</span></div></div>'
  +'</div>'

  +'<p style="font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.6">백업 파일을 저장해두면 폰을 바꾸거나 초기화해도 데이터를 복원할 수 있어요.</p>'

function setTheme(t){
  cfg.theme=t;sv();
  applyTheme(t);
  rConfig(); // 설정화면 새로고침해서 선택표시 업데이트
}

function doBackup(){
  var data={logs:logs,cfg:cfg,version:'rl9',date:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='레미콘운행일지_백업_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('백업 파일이 다운로드됐어요!\n파일앱 > 다운로드 폴더에 저장됩니다.');
}
function doRestore(ev){
  var file=ev.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.logs||!data.cfg){alert('올바른 백업 파일이 아니에요.');return;}
      if(!confirm('현재 데이터가 모두 백업 데이터로 교체됩니다.\n계속하시겠어요?'))return;
      logs=data.logs;cfg=data.cfg;sv();
      alert('복원 완료!');render();
    }catch(err){alert('파일을 읽을 수 없어요.');}
  };
  r.readAsText(file);
  ev.target.value='';
}
function doReset(){
  if(!confirm('정말로 모든 데이터를 삭제하시겠어요?\n이 작업은 되돌릴 수 없습니다.'))return;
  if(!confirm('한 번 더 확인합니다.\n전체 데이터를 삭제합니다.'))return;
  logs={};sv();alert('초기화 완료.');render();
}

/* ── 앱 아이콘 (iOS 홈화면용) ─────────────────
   iOS는 페이지 로드 시점에 apple-touch-icon을 캡처해요.
   기존 홈화면 아이콘은 삭제 후 재추가해야 바뀌어요.
*/
(function(){
  try{
    var c=document.createElement('canvas');c.width=180;c.height=180;
    var ctx=c.getContext('2d');
    // 배경
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath();ctx.moveTo(36,0);ctx.lineTo(144,0);ctx.quadraticCurveTo(180,0,180,36);ctx.lineTo(180,144);ctx.quadraticCurveTo(180,180,144,180);ctx.lineTo(36,180);ctx.quadraticCurveTo(0,180,0,144);ctx.lineTo(0,36);ctx.quadraticCurveTo(0,0,36,0);ctx.fill();
    // 트럭 이모지
    ctx.font='78px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🚛',90,80);
    // 하단 텍스트
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='bold 18px -apple-system,Arial,sans-serif';
    ctx.fillText('운행일지',90,146);
    // 상단 작은 텍스트
    ctx.fillStyle='rgba(255,210,100,0.9)';
    ctx.font='bold 11px -apple-system,Arial,sans-serif';
    ctx.fillText('레미콘',90,22);
    var dataUrl=c.toDataURL('image/png');
    // 기존 apple-touch-icon 제거 후 새로 추가
    var old=document.querySelector('link[rel="apple-touch-icon"]');
    if(old)old.parentNode.removeChild(old);
    var link=document.createElement('link');
    link.rel='apple-touch-icon';
    link.sizes='180x180';
    link.href=dataUrl;
    document.head.insertBefore(link,document.head.firstChild);
  }catch(e){}
})();

render();
</script>
